<!DOCTYPE html>
<html lang="en">
<head>
<script src="lock.js"></script>
<script src="/api/config"></script>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
<meta name="theme-color" content="#050506">
<title>Deni's Dashboard</title>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="sync.js" defer></script>
<script src="topbar.js" defer></script>
<script src="tasks.js" defer></script>

<style>
:root {
  --text-primary: #FAFAFA;
  --text-secondary: #B8B6B0;
  --text-tertiary: #76746E;
  --success: #6BE3A4;
  --warning: #F2C063;
  --danger: #FF6B6B;
  --font: -apple-system, BlinkMacSystemFont, "Inter", "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
  --font-mono: ui-monospace, "SF Mono", Menlo, Consolas, monospace;
}
* { box-sizing: border-box; }
html, body {
  margin: 0; padding: 0;
  background: #050506;
  color: var(--text-secondary);
  font-family: var(--font);
  -webkit-font-smoothing: antialiased;
  -moz-osx-font-smoothing: grayscale;
}
body {
  min-height: 100vh; position: relative; overflow-x: hidden;
  padding: max(28px, env(safe-area-inset-top)) 20px 60px;
}
body::before {
  content: ''; position: fixed; inset: 0;
  background:
    radial-gradient(circle at 82% 14%, rgba(224,118,88,0.16), transparent 45%),
    radial-gradient(circle at 18% 90%, rgba(180,180,200,0.06), transparent 50%);
  filter: blur(40px); pointer-events: none; z-index: -2;
  animation: drift 36s ease-in-out infinite alternate;
}
body::after {
  content: ''; position: fixed; inset: 0;
  background-image: radial-gradient(rgba(255,255,255,0.014) 1px, transparent 1px);
  background-size: 3px 3px; pointer-events: none; z-index: -1;
}
@keyframes drift { 0%{transform:translate3d(0,0,0)} 100%{transform:translate3d(-22px,14px,0)} }

.page { max-width: 640px; margin: 0 auto; }

.hub-head { display: flex; align-items: center; justify-content: space-between; gap: 12px; margin-bottom: 22px; }
.dash-title {
  margin: 0; font-size: 28px; font-weight: 700; letter-spacing: -0.025em;
  background: linear-gradient(180deg, #FFFFFF 0%, #C7C4BC 120%);
  -webkit-background-clip: text; background-clip: text;
  -webkit-text-fill-color: transparent; color: transparent;
}
@media (max-width: 480px) { .dash-title { font-size: 22px; } }
.icon-btn {
  width: 42px; height: 42px; flex-shrink: 0;
  display: inline-flex; align-items: center; justify-content: center;
  border-radius: 12px; border: 1px solid rgba(255,255,255,0.10);
  background: rgba(255,255,255,0.04); color: var(--text-secondary);
  cursor: pointer; transition: background 0.15s, color 0.15s, transform 0.1s;
  -webkit-tap-highlight-color: transparent; text-decoration: none;
}
.icon-btn:hover { background: rgba(255,255,255,0.08); color: var(--text-primary); }
.icon-btn:active { transform: scale(0.94); }
.icon-btn svg { width: 22px; height: 22px; }

/* ===== Up Next card ===== */
.next-card {
  position: relative; overflow: hidden;
  padding: 26px 24px;
  border-radius: 20px;
  background: rgba(255,255,255,0.04);
  border: 1px solid rgba(255,255,255,0.07);
  backdrop-filter: blur(24px) saturate(1.2);
  -webkit-backdrop-filter: blur(24px) saturate(1.2);
  box-shadow: 0 12px 40px rgba(0,0,0,0.45);
  margin-bottom: 16px;
}
.next-card::before {
  content: ''; position: absolute; inset: 0; pointer-events: none;
  background: radial-gradient(circle at 78% 0%, rgba(107,227,164,0.10), transparent 55%);
}
.next-eyebrow {
  font-size: 10.5px; font-weight: 700; letter-spacing: 0.18em; text-transform: uppercase;
  color: var(--text-tertiary); margin-bottom: 10px;
}
.next-title {
  font-size: 26px; font-weight: 700; letter-spacing: -0.02em;
  color: var(--text-primary); margin: 0 0 14px; line-height: 1.25;
  min-height: 33px;
}
@media (max-width: 480px) { .next-title { font-size: 21px; } }
.next-meta { display: flex; flex-wrap: wrap; gap: 8px; }
.chip {
  display: inline-flex; align-items: center; gap: 5px;
  padding: 5px 11px;
  border-radius: 999px;
  background: rgba(255,255,255,0.05);
  border: 1px solid rgba(255,255,255,0.08);
  font-size: 12px; font-weight: 600; color: var(--text-secondary);
  white-space: nowrap;
}
.chip.urgent { color: var(--danger); border-color: rgba(255,107,107,0.35); background: rgba(255,107,107,0.08); }
.chip.soon { color: var(--warning); border-color: rgba(242,192,99,0.35); background: rgba(242,192,99,0.08); }

.empty-hint { font-size: 14px; color: var(--text-tertiary); margin: 0 0 14px; }

/* ===== Action buttons ===== */
.actions { display: flex; flex-direction: column; gap: 10px; margin-bottom: 10px; }
.btn-complete {
  width: 100%; padding: 17px; border: 0; border-radius: 16px;
  background: linear-gradient(180deg, #FFFFFF 0%, #E8E5DD 100%);
  color: #0A0A0B; font-family: inherit; font-size: 16px; font-weight: 700;
  cursor: pointer;
  box-shadow: inset 0 1px 0 rgba(255,255,255,0.9), 0 8px 22px rgba(0,0,0,0.3);
  transition: transform 0.1s, filter 0.15s;
}
.btn-complete:hover { filter: brightness(1.05); }
.btn-complete:active { transform: translateY(1px); }
.btn-complete:disabled { opacity: 0.35; cursor: not-allowed; filter: none; }
.actions-row { display: flex; gap: 10px; }
.btn-secondary {
  flex: 1; padding: 14px; border-radius: 14px;
  border: 1px solid rgba(255,255,255,0.10);
  background: rgba(255,255,255,0.04); color: var(--text-primary);
  font-family: inherit; font-size: 14px; font-weight: 600; cursor: pointer;
  transition: background 0.15s, border-color 0.15s;
}
.btn-secondary:hover { background: rgba(255,255,255,0.08); }
.btn-secondary:disabled { opacity: 0.35; cursor: not-allowed; }
.btn-add {
  width: 100%; margin-top: 4px; padding: 14px;
  border: 1px dashed rgba(255,255,255,0.18); border-radius: 14px;
  background: transparent; color: var(--text-secondary);
  font-family: inherit; font-size: 13px; font-weight: 700;
  letter-spacing: 0.04em;
  cursor: pointer; transition: color 0.2s, border-color 0.2s, background 0.2s;
}
.btn-add:hover { color: var(--text-primary); border-color: rgba(255,255,255,0.32); background: rgba(255,255,255,0.04); border-style: solid; }

.remaining-note { text-align: center; font-size: 12px; color: var(--text-tertiary); margin-top: 16px; }

/* ===== Add Task modal ===== */
.modal-bg {
  position: fixed; inset: 0; z-index: 120; display: none;
  align-items: center; justify-content: center; padding: 20px;
  background: rgba(0,0,0,0.6); backdrop-filter: blur(10px); -webkit-backdrop-filter: blur(10px);
}
.modal-bg.show { display: flex; }
.modal {
  width: 100%; max-width: 440px; max-height: 88vh; overflow-y: auto;
  background: #0e0e10; border: 1px solid rgba(255,255,255,0.08);
  border-radius: 18px; padding: 22px; box-shadow: 0 24px 70px rgba(0,0,0,0.6);
}
.modal-head { display: flex; align-items: center; justify-content: space-between; margin-bottom: 18px; }
.modal-title { font-size: 18px; font-weight: 700; color: var(--text-primary); letter-spacing: -0.01em; }
.modal-close { border: 0; background: transparent; color: var(--text-tertiary); font-size: 26px; line-height: 1; cursor: pointer; padding: 0 4px; }
.modal-close:hover { color: var(--text-primary); }
.field { margin-bottom: 14px; }
.field-label { font-size: 11px; font-weight: 700; letter-spacing: 0.10em; text-transform: uppercase; color: var(--text-tertiary); margin-bottom: 7px; display: block; }
.set-input, .set-select {
  width: 100%; padding: 11px 13px;
  border: 1px solid rgba(255,255,255,0.08); border-radius: 11px;
  background: rgba(0,0,0,0.3); color: var(--text-primary);
  font-family: inherit; font-size: 14px; outline: none; transition: border-color 0.2s;
}
.set-input:focus, .set-select:focus { border-color: rgba(255,255,255,0.28); }
.set-select option { background: #0e0e10; }
.field-row-2 { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; }
.seg { display: flex; border: 1px solid rgba(255,255,255,0.10); border-radius: 11px; overflow: hidden; }
.seg button { flex: 1; border: 0; background: transparent; color: var(--text-tertiary); font-family: inherit; font-size: 13px; font-weight: 600; padding: 11px 8px; cursor: pointer; transition: background 0.15s, color 0.15s; }
.seg button.on { background: rgba(255,255,255,0.12); color: var(--text-primary); }
.set-save {
  width: 100%; margin-top: 6px; padding: 13px; border: 0; border-radius: 12px;
  background: linear-gradient(180deg,#FFFFFF,#E8E5DD); color: #0A0A0B;
  font-family: inherit; font-size: 14px; font-weight: 700; cursor: pointer;
  box-shadow: inset 0 1px 0 rgba(255,255,255,0.9), 0 8px 22px rgba(0,0,0,0.25);
  transition: filter 0.15s, transform 0.1s;
}
.set-save:hover { filter: brightness(1.05); }
.set-save:active { transform: translateY(1px); }
.set-status { text-align: center; font-size: 12px; color: var(--success); min-height: 16px; margin-top: 8px; }
.field-row { display: flex; gap: 8px; align-items: center; }
.section-divider { height: 1px; background: rgba(255,255,255,0.07); margin: 20px 0 14px; }
.whoop-box { margin-top: 8px; padding: 16px; border-radius: 14px; background: rgba(255,255,255,0.035); border: 1px solid rgba(255,255,255,0.06); }
.whoop-row { display: flex; align-items: center; justify-content: space-between; gap: 10px; }
.whoop-status { display: inline-flex; align-items: center; gap: 8px; font-size: 14px; font-weight: 600; color: var(--text-primary); }
.whoop-status .dot { width: 8px; height: 8px; border-radius: 50%; background: #76746E; }
.whoop-status.on .dot { background: #6BE3A4; box-shadow: 0 0 8px rgba(107,227,164,0.7); }
.whoop-sync { font-family: var(--font-mono); font-size: 11px; color: var(--text-tertiary); text-align: right; }
.whoop-stats { display: grid; grid-template-columns: repeat(3,1fr); gap: 10px; margin-top: 14px; }
.whoop-stat { text-align: center; }
.whoop-stat .v { font-size: 20px; font-weight: 700; color: var(--text-primary); font-variant-numeric: tabular-nums; line-height: 1; }
.whoop-stat .l { font-size: 9.5px; font-weight: 600; letter-spacing: 0.08em; text-transform: uppercase; color: var(--text-tertiary); margin-top: 5px; }
.whoop-btn { width: 100%; margin-top: 14px; padding: 11px; border: 1px solid rgba(255,255,255,0.12); border-radius: 11px; background: transparent; color: var(--text-secondary); font-family: inherit; font-size: 12px; font-weight: 700; letter-spacing: 0.06em; text-transform: uppercase; cursor: pointer; transition: background 0.15s, color 0.15s; }
.whoop-btn:hover { background: rgba(255,255,255,0.05); color: var(--text-primary); }
.more-tools-link { display: block; text-align: center; margin-top: 18px; font-size: 12px; color: var(--text-tertiary); text-decoration: none; }
.more-tools-link:hover { color: var(--text-primary); }

/* ===== Today's Calendar (on the decision screen) ===== */
.cal-section { margin-top: 22px; }
.cal-title {
  font-size: 10.5px; font-weight: 700; letter-spacing: 0.18em; text-transform: uppercase;
  color: var(--text-tertiary); margin-bottom: 10px;
}
.cal-row {
  display: flex; align-items: baseline; gap: 10px;
  padding: 10px 4px;
  border-bottom: 1px solid rgba(255,255,255,0.05);
  font-size: 13px;
}
.cal-row:last-child { border-bottom: none; }
.cal-time { font-family: var(--font-mono); font-size: 12px; color: var(--text-tertiary); flex-shrink: 0; width: 76px; }
.cal-event-title { color: var(--text-secondary); overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
</style>
</head>
<body>
<div class="page">

  <div class="hub-head">
    <h1 class="dash-title">Deni's Dashboard</h1>
    <button class="icon-btn" id="settingsOpen" type="button" aria-label="Settings">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
        <circle cx="12" cy="12" r="3"/>
        <path d="M19.4 15a1.65 1.65 0 0 0 .33 1.82l.06.06a2 2 0 1 1-2.83 2.83l-.06-.06a1.65 1.65 0 0 0-1.82-.33 1.65 1.65 0 0 0-1 1.51V21a2 2 0 0 1-4 0v-.09A1.65 1.65 0 0 0 9 19.4a1.65 1.65 0 0 0-1.82.33l-.06.06a2 2 0 1 1-2.83-2.83l.06-.06a1.65 1.65 0 0 0 .33-1.82 1.65 1.65 0 0 0-1.51-1H3a2 2 0 0 1 0-4h.09A1.65 1.65 0 0 0 4.6 9a1.65 1.65 0 0 0-.33-1.82l-.06-.06a2 2 0 1 1 2.83-2.83l.06.06a1.65 1.65 0 0 0 1.82.33H9a1.65 1.65 0 0 0 1-1.51V3a2 2 0 0 1 4 0v.09a1.65 1.65 0 0 0 1 1.51 1.65 1.65 0 0 0 1.82-.33l.06-.06a2 2 0 1 1 2.83 2.83l-.06.06a1.65 1.65 0 0 0-.33 1.82V9a1.65 1.65 0 0 0 1.51 1H21a2 2 0 0 1 0 4h-.09a1.65 1.65 0 0 0-1.51 1z"/>
      </svg>
    </button>
  </div>

  <div class="next-card">
    <div class="next-eyebrow" id="nextEyebrow">Right now</div>
    <h2 class="next-title" id="nextTitle">Loading…</h2>
    <div class="next-meta" id="nextMeta"></div>
  </div>

  <div class="actions">
    <button class="btn-complete" id="btnComplete" type="button">Complete</button>
    <div class="actions-row">
      <button class="btn-secondary" id="btnSkip" type="button">Skip</button>
      <button class="btn-secondary" id="btnReplan" type="button">Replan</button>
    </div>
    <button class="btn-add" id="btnAdd" type="button">+ ADD TASK</button>
  </div>

  <div class="remaining-note" id="remainingNote"></div>

  <div class="cal-section" id="calSection" style="display:none">
    <div class="cal-title">Today's Calendar</div>
    <div id="calList"></div>
  </div>

</div>

<!-- ===== Settings modal ===== -->
<div class="modal-bg" id="settingsBg">
  <div class="modal" role="dialog" aria-label="Settings">
    <div class="modal-head">
      <span class="modal-title">Settings</span>
      <button class="modal-close" id="settingsClose" type="button" aria-label="Close">×</button>
    </div>

    <label class="field-label">Google Calendar</label>
    <div class="whoop-box" id="gcalBox">
      <div class="whoop-row">
        <span class="whoop-status" id="gcalStatus"><span class="dot"></span><span id="gcalStatusText">Not connected</span></span>
      </div>
      <button class="whoop-btn" id="gcalAction" type="button">Connect Google Calendar</button>
    </div>

    <div class="section-divider"></div>

    <label class="field-label">WHOOP</label>
    <div class="whoop-box">
      <div class="whoop-row">
        <span class="whoop-status" id="whStatus"><span class="dot"></span><span id="whStatusText">Not connected</span></span>
        <span class="whoop-sync" id="whSync"></span>
      </div>
      <div class="whoop-stats" id="whStats" style="display:none">
        <div class="whoop-stat"><div class="v" id="whRec">—</div><div class="l">Recovery</div></div>
        <div class="whoop-stat"><div class="v" id="whSleep">—</div><div class="l">Sleep</div></div>
        <div class="whoop-stat"><div class="v" id="whRhr">—</div><div class="l">Rest HR</div></div>
      </div>
      <button class="whoop-btn" id="whAction" type="button">Sync now</button>
    </div>

    <div class="section-divider"></div>

    <div class="field">
      <label class="field-label">Height</label>
      <div class="field-row">
        <input class="set-input" id="heightA" type="number" min="0" inputmode="decimal" placeholder="cm">
        <input class="set-input" id="heightB" type="number" min="0" inputmode="decimal" placeholder="in" style="display:none">
        <div class="seg" id="heightUnitSeg">
          <button type="button" data-u="cm" class="on">cm</button>
          <button type="button" data-u="ft">ft/in</button>
        </div>
      </div>
    </div>

    <div class="field">
      <label class="field-label">Weight</label>
      <div class="field-row">
        <input class="set-input" id="weight" type="number" min="0" inputmode="decimal" placeholder="weight">
        <div class="seg" id="weightUnitSeg">
          <button type="button" data-u="kg" class="on">kg</button>
          <button type="button" data-u="lb">lb</button>
        </div>
      </div>
    </div>

    <div class="field">
      <label class="field-label">Age</label>
      <input class="set-input" id="age" type="number" min="0" inputmode="numeric" placeholder="years">
    </div>

    <div class="field">
      <label class="field-label">Sex</label>
      <div class="seg" id="sexSeg" style="width:100%;display:flex">
        <button type="button" data-s="m" style="flex:1">Male</button>
        <button type="button" data-s="f" style="flex:1">Female</button>
      </div>
    </div>

    <div class="field">
      <label class="field-label">Active hours / week</label>
      <input class="set-input" id="activity" type="number" min="0" inputmode="decimal" placeholder="e.g. 5">
    </div>

    <button class="set-save" id="settingsSave" type="button">Save</button>
    <div class="set-status" id="settingsStatus"></div>

    <a class="more-tools-link" href="hub.html">More tools (Fitness, Health, Water, Finance, Caffeine, Nova) →</a>
  </div>
</div>

<!-- ===== Add Task modal ===== -->
<div class="modal-bg" id="addBg">
  <div class="modal" role="dialog" aria-label="Add task">
    <div class="modal-head">
      <span class="modal-title">Add Task</span>
      <button class="modal-close" id="addClose" type="button" aria-label="Close">×</button>
    </div>

    <div class="field">
      <label class="field-label">Title</label>
      <input class="set-input" id="taskTitle" type="text" placeholder="What needs doing?" autocomplete="off">
    </div>

    <div class="field">
      <label class="field-label">Category</label>
      <select class="set-select" id="taskCategory">
        <option value="lab">Lab</option>
        <option value="school">School</option>
        <option value="debate">Debate</option>
        <option value="health">Health</option>
        <option value="money">Money</option>
        <option value="admin">Admin</option>
        <option value="personal" selected>Personal</option>
      </select>
    </div>

    <div class="field">
      <label class="field-label">Energy required</label>
      <div class="seg" id="energySeg">
        <button type="button" data-v="low">Low</button>
        <button type="button" data-v="medium" class="on">Medium</button>
        <button type="button" data-v="high">High</button>
      </div>
    </div>

    <div class="field field-row-2">
      <div>
        <label class="field-label">Importance (1–5)</label>
        <input class="set-input" id="taskImportance" type="number" min="1" max="5" value="3" inputmode="numeric">
      </div>
      <div>
        <label class="field-label">Est. minutes</label>
        <input class="set-input" id="taskMinutes" type="number" min="1" value="30" inputmode="numeric">
      </div>
    </div>

    <div class="field">
      <label class="field-label">Deadline (optional)</label>
      <input class="set-input" id="taskDeadline" type="datetime-local">
    </div>

    <button class="set-save" id="taskSave" type="button">Add Task</button>
  </div>
</div>

<script>
(function () {
  'use strict';
  const $ = (id) => document.getElementById(id);

  const CATEGORY_EMOJI = { lab: '🧪', school: '📚', debate: '🎤', health: '💊', money: '💰', admin: '🗂️', personal: '🌱' };

  function whenTasksReady(fn) {
    if (window.Tasks) { fn(); return; }
    document.addEventListener('DOMContentLoaded', () => {
      if (window.Tasks) fn();
      else setTimeout(() => window.Tasks && fn(), 50);
    });
  }

  function formatDeadline(deadline, now) {
    if (!deadline) return { text: 'No deadline', cls: '' };
    const d = new Date(deadline).getTime();
    const diffMs = d - now;
    const diffH = diffMs / 3600000;
    if (diffH <= 0) return { text: 'Overdue', cls: 'urgent' };
    if (diffH < 6) return { text: 'Due in ' + Math.round(diffH * 60) + 'm', cls: 'urgent' };
    if (diffH < 24) return { text: 'Due in ' + Math.round(diffH) + 'h', cls: 'soon' };
    const days = Math.round(diffH / 24);
    return { text: 'Due in ' + days + 'd', cls: '' };
  }

  function formatFreeMinutes(mins) {
    if (mins <= 0) return 'Busy right now';
    if (mins < 60) return mins + 'm free';
    const h = Math.floor(mins / 60), m = mins % 60;
    return h + 'h' + (m ? ' ' + m + 'm' : '') + ' free';
  }

  async function render() {
    if (!window.Tasks) return;
    const tasks = window.Tasks.getTasks();
    const now = Date.now();

    let availableMinutes = null;
    let cal = null;
    try {
      cal = await window.Tasks.getCalendarContext();
      if (cal && cal.connected) availableMinutes = cal.availableMinutes;
    } catch (e) {}

    const ranked = window.Tasks.rankTasks(tasks, { now, availableMinutes });
    const top = ranked[0];

    const titleEl = $('nextTitle');
    const metaEl  = $('nextMeta');
    const eyebrow = $('nextEyebrow');
    const completeBtn = $('btnComplete');
    const skipBtn = $('btnSkip');

    if (!top) {
      eyebrow.textContent = 'Right now';
      titleEl.textContent = 'Nothing on your list';
      metaEl.innerHTML = '<span class="chip">Add a task to get moving</span>';
      completeBtn.disabled = true;
      skipBtn.disabled = true;
    } else {
      const task = top.task;
      eyebrow.textContent = 'Right now';
      titleEl.textContent = task.title;
      const dl = formatDeadline(task.deadline, now);
      const chips = [
        '<span class="chip">' + (CATEGORY_EMOJI[task.category] || '') + ' ' + task.category + '</span>',
        '<span class="chip">' + task.estimatedMinutes + ' min</span>',
        '<span class="chip">' + task.energyLevel + ' energy</span>',
        '<span class="chip ' + dl.cls + '">' + dl.text + '</span>',
      ];
      if (cal && cal.connected && cal.availableMinutes != null) {
        chips.push('<span class="chip">📅 ' + formatFreeMinutes(cal.availableMinutes) + '</span>');
      }
      metaEl.innerHTML = chips.join('');
      completeBtn.disabled = false;
      skipBtn.disabled = false;
    }

    const remaining = tasks.filter(t => !t.done).length;
    $('remainingNote').textContent = remaining === 0 ? '' :
      (remaining === 1 ? '1 task waiting' : remaining + ' tasks waiting');

    completeBtn.dataset.taskId = top ? top.task.id : '';
    skipBtn.dataset.taskId = top ? top.task.id : '';

    renderCalendarList(cal, now);
  }

  function formatEventTime(iso, allDay) {
    if (allDay) return 'All day';
    const d = new Date(iso);
    let h = d.getHours();
    const m = d.getMinutes();
    const ampm = h >= 12 ? 'PM' : 'AM';
    h = h % 12; if (h === 0) h = 12;
    return h + ':' + String(m).padStart(2, '0') + ' ' + ampm;
  }

  function renderCalendarList(cal, now) {
    const section = $('calSection');
    const list = $('calList');
    if (!cal || !cal.connected || !cal.events || cal.events.length === 0) {
      section.style.display = 'none';
      return;
    }
    const upcoming = cal.events
      .filter(ev => ev.allDay || new Date(ev.end).getTime() > now)
      .slice(0, 5);
    if (upcoming.length === 0) {
      section.style.display = 'none';
      return;
    }
    list.innerHTML = upcoming.map(ev =>
      '<div class="cal-row"><span class="cal-time">' + formatEventTime(ev.start, ev.allDay) +
      '</span><span class="cal-event-title">' + ev.title.replace(/</g, '&lt;') + '</span></div>'
    ).join('');
    section.style.display = '';
  }

  function wireActions() {
    $('btnComplete').addEventListener('click', function () {
      const id = this.dataset.taskId;
      if (!id) return;
      window.Tasks.completeTask(id);
      render();
    });
    $('btnSkip').addEventListener('click', function () {
      const id = this.dataset.taskId;
      if (!id) return;
      window.Tasks.skipTask(id, 60);
      render();
    });
    $('btnReplan').addEventListener('click', function () {
      render();
    });
  }

  /* ---------- Add Task modal ---------- */
  let energyValue = 'medium';
  function wireAddModal() {
    function open() {
      $('taskTitle').value = '';
      $('taskCategory').value = 'personal';
      energyValue = 'medium';
      $('energySeg').querySelectorAll('button').forEach(b => b.classList.toggle('on', b.dataset.v === 'medium'));
      $('taskImportance').value = 3;
      $('taskMinutes').value = 30;
      $('taskDeadline').value = '';
      $('addBg').classList.add('show');
      setTimeout(() => $('taskTitle').focus(), 50);
    }
    function close() { $('addBg').classList.remove('show'); }

    $('btnAdd').addEventListener('click', open);
    $('addClose').addEventListener('click', close);
    $('addBg').addEventListener('click', (e) => { if (e.target === $('addBg')) close(); });
    document.addEventListener('keydown', (e) => { if (e.key === 'Escape' && $('addBg').classList.contains('show')) close(); });

    $('energySeg').querySelectorAll('button').forEach(b => b.addEventListener('click', () => {
      energyValue = b.dataset.v;
      $('energySeg').querySelectorAll('button').forEach(x => x.classList.toggle('on', x === b));
    }));

    $('taskSave').addEventListener('click', () => {
      const title = $('taskTitle').value.trim();
      if (!title) { $('taskTitle').focus(); return; }
      const deadlineVal = $('taskDeadline').value;
      window.Tasks.addTask({
        title,
        category: $('taskCategory').value,
        energyLevel: energyValue,
        importance: parseInt($('taskImportance').value, 10) || 3,
        estimatedMinutes: parseInt($('taskMinutes').value, 10) || 30,
        deadline: deadlineVal ? new Date(deadlineVal).toISOString() : null,
      });
      close();
      render();
    });
  }

  whenTasksReady(function () {
    wireActions();
    wireAddModal();
    render();

    window.addEventListener('tasks-changed', render);
    window.addEventListener('storage', render);

    if (typeof initCloudSync === 'function') {
      initCloudSync({
        appKey: 'tasks',
        syncedKeys: ['tasks_v1'],
        onApplied: render,
      });
    }

    // Recompute urgency chips / ranking as time passes.
    setInterval(render, 60 * 1000);
  });
})();
</script>

<script>
(function () {
  'use strict';
  const $ = (id) => document.getElementById(id);
  const WATER_KEY = 'po_water_v1';
  const WHOOP_KEY = 'whoop_tokens_v1';
  const SYNC_KEY  = 'whoop_last_sync';
  const GCAL_KEY  = 'gcal_tokens_v1';

  function loadJSON(k, f) { try { return JSON.parse(localStorage.getItem(k)) || f; } catch (e) { return f; } }
  function saveJSON(k, v) { localStorage.setItem(k, JSON.stringify(v)); }

  /* ---------- Google Calendar OAuth redirect handling ---------- */
  // google-callback.js redirects here (/index.html#google_access=...) —
  // parse it immediately, not just when the settings modal happens to be
  // open, so the connect flow completes even if the user never reopens it.
  if (location.hash && location.hash.indexOf('google_access') !== -1) {
    const h = new URLSearchParams(location.hash.slice(1));
    const access = h.get('google_access'), refresh = h.get('google_refresh');
    const expires = Number(h.get('google_expires')) || Date.now() + 3500e3;
    if (access) {
      saveJSON(GCAL_KEY, { access, refresh, expires });
      history.replaceState(null, '', location.pathname + location.search);
    }
  }

  // Mirror of topbar.js defaultWaterState so we never clobber the water tracker.
  function defaultWater() {
    return { unit:'bottle', bottleMl:500, glassMl:250, weightUnit:'kg',
      profile:{ weightKg:75, age:25, sex:'m', activityHrsPerWeek:5 },
      caffeineMgPerDay:200, substances:[], logs:{} };
  }

  /* ---------- unit state ---------- */
  let heightUnit = 'cm';   // 'cm' | 'ft'
  let weightUnit = 'kg';   // 'kg' | 'lb'
  let sex = 'm';

  function setHeightUnit(u) {
    heightUnit = u;
    $('heightUnitSeg').querySelectorAll('button').forEach(b => b.classList.toggle('on', b.dataset.u === u));
    const a = $('heightA'), b = $('heightB');
    if (u === 'cm') { a.placeholder = 'cm'; b.style.display = 'none'; }
    else { a.placeholder = 'ft'; b.placeholder = 'in'; b.style.display = ''; }
  }
  function setWeightUnit(u) {
    weightUnit = u;
    $('weightUnitSeg').querySelectorAll('button').forEach(b => b.classList.toggle('on', b.dataset.u === u));
  }
  function setSex(s) {
    sex = s;
    $('sexSeg').querySelectorAll('button').forEach(b => b.classList.toggle('on', b.dataset.s === s));
  }

  function getHeightCm() {
    if (heightUnit === 'cm') { const v = parseFloat($('heightA').value); return v > 0 ? v : null; }
    const ft = parseFloat($('heightA').value) || 0;
    const inch = parseFloat($('heightB').value) || 0;
    const cm = ft * 30.48 + inch * 2.54;
    return cm > 0 ? Math.round(cm) : null;
  }
  function fillHeight(cm) {
    if (!cm) { $('heightA').value = ''; $('heightB').value = ''; return; }
    if (heightUnit === 'cm') { $('heightA').value = Math.round(cm); }
    else { const totalIn = cm / 2.54; $('heightA').value = Math.floor(totalIn / 12); $('heightB').value = Math.round(totalIn % 12); }
  }

  /* ---------- load existing profile into the form ---------- */
  function populate() {
    const w = loadJSON(WATER_KEY, defaultWater());
    const p = w.profile || {};
    setWeightUnit(w.weightUnit === 'lb' ? 'lb' : 'kg');
    setHeightUnit(p.heightUnit === 'ft' ? 'ft' : 'cm');
    setSex(p.sex === 'f' ? 'f' : 'm');
    fillHeight(p.heightCm || null);
    if (p.weightKg) $('weight').value = weightUnit === 'lb' ? Math.round(p.weightKg * 2.20462) : Math.round(p.weightKg);
    else $('weight').value = '';
    $('age').value = p.age || '';
    $('activity').value = (p.activityHrsPerWeek != null ? p.activityHrsPerWeek : '');
  }

  /* ---------- save back into po_water_v1 (merge, never overwrite logs) ---------- */
  function save() {
    const w = loadJSON(WATER_KEY, defaultWater());
    w.profile = w.profile || {};
    const cm = getHeightCm();
    if (cm) { w.profile.heightCm = cm; w.profile.heightUnit = heightUnit; }
    const wv = parseFloat($('weight').value);
    if (wv > 0) { w.profile.weightKg = weightUnit === 'lb' ? +(wv / 2.20462).toFixed(1) : wv; w.weightUnit = weightUnit; }
    const age = parseInt($('age').value, 10); if (age > 0) w.profile.age = age;
    w.profile.sex = sex;
    const act = parseFloat($('activity').value); if (act >= 0 && !isNaN(act)) w.profile.activityHrsPerWeek = act;
    saveJSON(WATER_KEY, w);
    const s = $('settingsStatus'); s.textContent = 'Saved ✓';
    setTimeout(() => { s.textContent = ''; }, 1800);
  }

  /* ---------- Google Calendar connect / disconnect ---------- */
  function renderGcal() {
    const t = loadJSON(GCAL_KEY, null);
    const statusEl = $('gcalStatus'), txt = $('gcalStatusText'), action = $('gcalAction');
    if (!t || !t.access) {
      statusEl.classList.remove('on'); txt.textContent = 'Not connected';
      action.textContent = 'Connect Google Calendar';
    } else {
      statusEl.classList.add('on'); txt.textContent = 'Connected';
      action.textContent = 'Disconnect';
    }
  }
  $('gcalAction').addEventListener('click', () => {
    const t = loadJSON(GCAL_KEY, null);
    if (t && t.access) {
      try { localStorage.removeItem(GCAL_KEY); } catch (e) {}
      renderGcal();
      window.dispatchEvent(new CustomEvent('tasks-changed'));
      return;
    }
    const clientId = window.DASH_GOOGLE_CLIENT_ID || '';
    if (!clientId) {
      alert("Google Calendar isn't configured yet — set GOOGLE_CLIENT_ID in Vercel (see SETUP.md).");
      return;
    }
    const redirect = window.location.origin + '/api/google-callback';
    const url = 'https://accounts.google.com/o/oauth2/v2/auth'
      + '?client_id='     + encodeURIComponent(clientId)
      + '&redirect_uri='  + encodeURIComponent(redirect)
      + '&response_type=code'
      + '&scope='         + encodeURIComponent('https://www.googleapis.com/auth/calendar.readonly')
      + '&access_type=offline'
      + '&prompt=consent'
      + '&state='         + Math.random().toString(36).slice(2);
    location.href = url;
  });

  /* ---------- open / close ---------- */
  function open() { populate(); renderWhoop(); renderGcal(); $('settingsBg').classList.add('show'); syncWhoop(); }
  function close() { $('settingsBg').classList.remove('show'); }
  $('settingsOpen').addEventListener('click', open);
  $('settingsClose').addEventListener('click', close);
  $('settingsBg').addEventListener('click', (e) => { if (e.target === $('settingsBg')) close(); });
  document.addEventListener('keydown', (e) => { if (e.key === 'Escape') close(); });
  $('settingsSave').addEventListener('click', save);
  $('heightUnitSeg').querySelectorAll('button').forEach(b => b.addEventListener('click', () => {
    const cm = getHeightCm(); setHeightUnit(b.dataset.u); fillHeight(cm);
  }));
  $('weightUnitSeg').querySelectorAll('button').forEach(b => b.addEventListener('click', () => {
    const v = parseFloat($('weight').value);
    const kg = v > 0 ? (weightUnit === 'lb' ? v / 2.20462 : v) : null;
    setWeightUnit(b.dataset.u);
    if (kg) $('weight').value = weightUnit === 'lb' ? Math.round(kg * 2.20462) : Math.round(kg);
  }));
  $('sexSeg').querySelectorAll('button').forEach(b => b.addEventListener('click', () => setSex(b.dataset.s)));

  /* ---------- WHOOP ---------- */
  let whStats = null;
  function relTime(ts) {
    if (!ts) return 'never';
    const s = Math.floor((Date.now() - ts) / 1000);
    if (s < 60) return 'just now';
    if (s < 3600) return Math.floor(s/60) + ' min ago';
    if (s < 86400) return Math.floor(s/3600) + ' h ago';
    return Math.floor(s/86400) + ' d ago';
  }
  function renderWhoop(err) {
    const t = loadJSON(WHOOP_KEY, null);
    const statusEl = $('whStatus'), txt = $('whStatusText'), syncEl = $('whSync'), action = $('whAction');
    if (!t || !t.access) {
      statusEl.classList.remove('on'); txt.textContent = 'Not connected';
      syncEl.textContent = ''; $('whStats').style.display = 'none';
      action.textContent = 'Connect on Health page';
      return;
    }
    statusEl.classList.add('on'); txt.textContent = err ? 'Connected (sync failed)' : 'Connected';
    const last = Number(localStorage.getItem(SYNC_KEY)) || 0;
    syncEl.textContent = 'Last synced ' + relTime(last);
    action.textContent = 'Sync now';
    if (whStats) {
      $('whStats').style.display = '';
      $('whRec').textContent   = whStats.rec   != null ? whStats.rec + '%'  : '—';
      $('whSleep').textContent = whStats.sleep != null ? whStats.sleep + '%' : '—';
      $('whRhr').textContent   = whStats.rhr   != null ? whStats.rhr         : '—';
    }
  }
  async function wRefresh(t) {
    if (!t.refresh) return null;
    try {
      const r = await fetch('/api/whoop-refresh', { method:'POST', headers:{'Content-Type':'application/json'}, body: JSON.stringify({ refresh_token: t.refresh }) });
      const j = await r.json();
      if (j.access_token) { const n = { access:j.access_token, refresh:j.refresh_token||t.refresh, expires:Date.now()+(j.expires_in||3500)*1000 }; saveJSON(WHOOP_KEY, n); return n; }
    } catch (e) {}
    return null;
  }
  async function wFetch(path, t) {
    const [p, qs] = path.split('?');
    const params = new URLSearchParams(qs || ''); params.set('path', p);
    const r = await fetch('/api/whoop-data?' + params.toString(), { headers: { 'Authorization': 'Bearer ' + t.access, 'Accept':'application/json' } });
    if (r.status === 401) { const n = await wRefresh(t); if (n) return wFetch(path, n); throw new Error('unauthorized'); }
    if (!r.ok) throw new Error('whoop ' + r.status);
    return r.json();
  }
  async function syncWhoop() {
    let t = loadJSON(WHOOP_KEY, null);
    if (!t || !t.access) return;
    if (t.expires && Date.now() > t.expires - 60000) { const n = await wRefresh(t); if (n) t = n; }
    try {
      const [rec, sleep] = await Promise.all([
        wFetch('/recovery?limit=1', t).catch(()=>null),
        wFetch('/activity/sleep?limit=1', t).catch(()=>null),
      ]);
      const r0 = rec && rec.records && rec.records[0];
      const s0 = sleep && sleep.records && sleep.records[0];
      whStats = {
        rec:   r0 && r0.score && r0.score.recovery_score != null ? Math.round(r0.score.recovery_score) : null,
        rhr:   r0 && r0.score && r0.score.resting_heart_rate != null ? Math.round(r0.score.resting_heart_rate) : null,
        sleep: s0 && s0.score && s0.score.sleep_performance_percentage != null ? Math.round(s0.score.sleep_performance_percentage) : null,
      };
      localStorage.setItem(SYNC_KEY, String(Date.now()));
      renderWhoop();
    } catch (e) { renderWhoop(e); }
  }
  $('whAction').addEventListener('click', () => {
    const t = loadJSON(WHOOP_KEY, null);
    if (!t || !t.access) { window.location.href = 'health.html'; return; }
    $('whAction').textContent = 'Syncing…'; syncWhoop();
  });
})();
</script>
</body>
